    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; -webkit-font-smoothing: antialiased; }
        html { overflow-x: hidden; }
        body {
            min-height: 100vh;
            font: 400 16px/28px "EB Garamond", serif;
            color: #282a3a;
            background: #f8f7f4;
            display: flex;
            flex-direction: column;
        }
        .header {
            position: fixed;
            top: 0; left: 0; right: 0;
            display: flex;
            align-items: center;
            padding: 1.5rem 3rem;
            background: #f8f7f4;
            z-index: 100;
        }
        .logo { height: 18px; }
        .content {
            flex: 1;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            padding: 0 2rem;
            text-align: center;
        }
        .check {
            width: 64px;
            height: 64px;
            margin-bottom: 2rem;
        }
        .check circle {
            fill: none;
            stroke: #14ae5c;
            stroke-width: 2;
        }
        .check path {
            fill: none;
            stroke: #14ae5c;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
            stroke-dasharray: 24;
            stroke-dashoffset: 24;
            animation: draw 0.4s 0.2s ease forwards;
        }
        @keyframes draw {
            to { stroke-dashoffset: 0; }
        }
        h1 {
            font: 600 2.5rem/1.2 "Crimson Pro", serif;
            color: #282a3a;
            margin-bottom: 0.75rem;
        }
        p {
            font: 400 1.1rem/1.6 "EB Garamond", serif;
            color: #62636c;
        }
        @media (max-width: 768px) {
            .header { padding: 1rem 1.5rem; }
            h1 { font-size: 2rem; }
        }
    </style>
</head>
